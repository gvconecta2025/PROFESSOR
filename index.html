<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professor Luiz Henrique | Autoridade Educacional</title>
    <meta name="description" content="Estrategista de Produção Digital, Autor e Educador Matemático.">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <header class="hero-section" aria-label="Apresentação Principal">
        <div class="container hero-content">
            <div class="hero-text" id="hero-text-container">
                </div>
            <div class="hero-image-wrapper">
                <img id="hero-image" src="" alt="Retrato do Professor Luiz Henrique" loading="eager">
            </div>
        </div>
    </header>

    <aside class="trust-bar" aria-label="Pilares de Atuação">
        <div class="container trust-grid" id="trust-container">
            </div>
    </aside>

    <main>
        <section class="timeline-section container" aria-labelledby="timeline-title">
            <h2 id="timeline-title" class="section-title">Trajetória e Marcos</h2>
            <div class="timeline" id="timeline-container">
                </div>
        </section>

        <section class="library-section bg-alt" aria-labelledby="library-title">
            <div class="container">
                <h2 id="library-title" class="section-title">Obras Publicadas</h2>
                <div class="library-grid" id="library-container">
                    </div>
            </div>
        </section>

        <section class="services-section container" aria-labelledby="services-title">
            <h2 id="services-title" class="section-title">Áreas de Atuação</h2>
            <div class="services-grid" id="services-container">
                </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container footer-content">
            <p>&copy; 2026 Professor Luiz Henrique. Todos os direitos reservados.</p>
            <a href="mailto:contato@exemplo.com" class="btn btn-outline">Agende uma conversa profissional</a>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
