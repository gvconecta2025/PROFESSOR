<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professor Luiz Henrique | Autoridade Educacional</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- Cabeçalho Fixo Topo -->
    <header class="top-nav">
        <div class="nav-container">
            <!-- Simulação da Logo DEZ-ENVOLVE -->
            <div class="logo">
                <span class="logo-black">DEZ</span><span class="logo-blue">-ENVOLVE</span>
            </div>
            <a href="mailto:contato@exemplo.com" class="btn-green">
                <i data-lucide="message-circle" class="btn-icon"></i>
                CONTATO PROFISSIONAL
            </a>
        </div>
    </header>

    <!-- Fundo cinza e Cartão Central -->
    <div class="page-wrapper">
        <main class="content-card">
            
            <!-- Hero Section (Estilo Artigo) -->
            <section class="editorial-hero" id="hero-container">
                <!-- Conteúdo injetado via JS -->
            </section>

            <hr class="divider">

            <!-- Narrative Timeline -->
            <section class="content-section">
                <h2 class="section-title">Trajetória e Marcos</h2>
                <div class="timeline" id="timeline-container">
                    <!-- Conteúdo injetado via JS -->
                </div>
            </section>

            <!-- Library Showcase -->
            <section class="content-section">
                <h2 class="section-title">Obras Publicadas</h2>
                <div class="library-list" id="library-container">
                    <!-- Conteúdo injetado via JS -->
                </div>
            </section>

            <!-- Service Grid -->
            <section class="content-section">
                <h2 class="section-title">Áreas de Atuação</h2>
                <div class="services-list" id="services-container">
                    <!-- Conteúdo injetado via JS -->
                </div>
            </section>

        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
